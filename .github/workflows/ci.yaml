on:
  push:
    branches:
      - main
  release:
    types: [published]
  pull_request:
  workflow_dispatch:

name: CI

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  prek:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: j178/prek-action@5337cb91e0fa35a7ff31b9ca345126d8bbbcdf16 # v2.0.6
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Enable binfmt
        run: |
          make enable-binfmt
      - name: Patch rkbin
        run: |
          make patch-rkbin
      - name: Create SPL Loader
        run: |
          make spl-loader
      - name: Create container
        run: |
          make build-image
      - name: Build tf-a
        run: |
          make build-bl31
      - name: Build U-Boot
        run: |
          make build-u-boot-tf-a
      - name: Collect licenses
        run: |
          make licenses
      - name: Package bundle
        run: |
          make package VERSION="${{ github.event_name == 'release' && github.ref_name || github.sha }}"
      - name: Store result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifacts
          path: |
            artifacts/**
            dist/**
          retention-days: 2

  release:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download result
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: artifacts
      - name: Upload bundle to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release upload
          --clobber "${{ github.ref_name }}"
          --repo "${{ github.repository }}"
          dist/*.zip dist/*.zip.sha256
      - name: Sign release bundle
        uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1 # v3.4.0
        with:
          inputs: dist/*.zip
          release-signing-artifacts: true
          verify: true
          verify-cert-identity: https://github.com/${{ github.repository }}/.github/workflows/ci.yaml@${{ github.ref }}
          verify-oidc-issuer: https://token.actions.githubusercontent.com
